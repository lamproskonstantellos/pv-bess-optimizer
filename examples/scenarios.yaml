# Worked scenario comparison.  Run against the case-study workbook:
#
#     pvbess inputs/input.xlsx --scenarios examples/scenarios.yaml
#
# Each scenario overrides the base input; `inherits` clones another
# scenario and overrides it.  Overrides use either the canonical sheet
# keys or the short aliases (pv.nameplate_kwp, bess.power_kw, ...).
scenarios:
  - name: "Self-consumption hybrid"
    project: { mode: self_consumption }

  - name: "Merchant hybrid"
    project: { mode: merchant }

  - name: "Merchant hybrid + balancing"
    inherits: "Merchant hybrid"
    balancing: on

  - name: "Merchant PV only"
    inherits: "Merchant hybrid"
    bess: { power_kw: 0, capacity_kwh: 0 }

  - name: "Merchant BESS only"
    inherits: "Merchant hybrid"
    pv: { nameplate_kwp: 0 }
    project: { mode: merchant, allow_bess_grid_charging: true }

  # capex_multiplier scales capex_pv_eur_per_kw, capex_bess_eur_per_kwh
  # and site_capex_eur together.
  - name: "Cheap CAPEX (merchant hybrid)"
    inherits: "Merchant hybrid"
    capex_multiplier: 0.8

  # BESS replacement triggered by state of health instead of a fixed
  # year: "auto" replaces in the first year SOH falls to bess_eol_soh_pct
  # (a blank workbook cell means the same thing; 0 means never replace).
  - name: "SOH-triggered replacement (merchant hybrid)"
    inherits: "Merchant hybrid"
    bess:
      capex_bess_eur_per_kwh: 200
      bess_replacement_year: auto
      bess_eol_soh_pct: 80

  - name: "Merchant hybrid + PPA"
    inherits: "Merchant hybrid"
    ppa:
      ppa_enabled: true
      ppa_settlement: physical
      ppa_price_eur_per_mwh: 65
      ppa_volume_share_pct: 80
      ppa_term_years: 10

  # Baseload band settled financially against total export (cfd-only;
  # dispatch is provably unchanged - see docs/ppa_design.md P9-P11).
  - name: "Merchant hybrid + baseload PPA"
    inherits: "Merchant hybrid"
    ppa:
      ppa_enabled: true
      ppa_structure: baseload
      ppa_settlement: cfd
      ppa_price_eur_per_mwh: 70
      ppa_baseload_mw: 3
      ppa_term_years: 10

  # Lender view: debt sized to a covenant instead of a gearing input
  # (gearing becomes an output), sculpted repayment so coverage is
  # level across the tenor, and the P90/base lender case table.
  - name: "Merchant hybrid + sized debt"
    inherits: "Merchant hybrid"
    economics:
      debt_sizing_mode: target_dscr
      target_dscr: 1.30
      debt_repayment: sculpted
      debt_tenor_years: 12
      production_p90_factor_pct: 92
      lender_cases_enabled: true
